name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Run backend tests
        run: python3 -m pytest -q

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  backend-docker-smoke:
    name: Backend Docker Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t ai-analytics-backend:ci ./backend

      - name: Run backend container
        run: |
          docker run -d \
            --name ai-analytics-backend-smoke \
            -p 8000:8000 \
            -e ENABLE_MORTGAGE_DASHBOARD=false \
            -e ENABLE_SWIM_DASHBOARD=false \
            ai-analytics-backend:ci

      - name: Wait for health endpoint
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/api/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Backend health check failed"
          docker logs ai-analytics-backend-smoke
          exit 1

      - name: Cleanup container
        if: always()
        run: docker rm -f ai-analytics-backend-smoke || true
