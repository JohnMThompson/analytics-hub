name: Deploy to DigitalOcean

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy on Droplet
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DO_SSH_KEY }}

      - name: Add droplet host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.DO_SSH_PORT || '22' }}" "${{ secrets.DO_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        env:
          DO_HOST: ${{ secrets.DO_HOST }}
          DO_USER: ${{ secrets.DO_USER }}
          DO_SSH_PORT: ${{ secrets.DO_SSH_PORT || '22' }}
        run: |
          ssh -p "$DO_SSH_PORT" "$DO_USER@$DO_HOST" <<'EOF'
          set -euo pipefail
          cd /opt/ai-analytics
          git fetch origin
          git checkout main
          git reset --hard origin/main
          docker compose -f docker-compose.yml -f docker-compose.prod.yml build
          docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans
          docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-deps --force-recreate caddy
          EOF

      - name: Verify deployment health
        env:
          APP_DOMAIN: ${{ secrets.APP_DOMAIN }}
        run: |
          for i in {1..30}; do
            if curl -fsS "https://${APP_DOMAIN}/api/health" >/dev/null; then
              curl -fsS "https://${APP_DOMAIN}/api/ready" >/dev/null || true
              exit 0
            fi
            sleep 5
          done
          echo "Deployment health check failed"
          exit 1
