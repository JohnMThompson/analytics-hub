services:
  backend:
    ports: !reset []
    expose:
      - "8000"

  frontend:
    ports: !reset []
    build:
      args:
        - VITE_API_URL=
    expose:
      - "3000"

  caddy:
    image: caddy:2.8.4-alpine
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    environment:
      - APP_DOMAIN=${APP_DOMAIN}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - ai-analytics

volumes:
  caddy_data:
  caddy_config:
