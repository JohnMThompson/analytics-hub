version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DB_MORTGAGE_HOST=${DB_MORTGAGE_HOST}
      - DB_MORTGAGE_USER=${DB_MORTGAGE_USER}
      - DB_MORTGAGE_PASSWORD=${DB_MORTGAGE_PASSWORD}
      - DB_MORTGAGE_NAME=${DB_MORTGAGE_NAME}
      - DB_MORTGAGE_PORT=${DB_MORTGAGE_PORT:-3306}
      - DB_SWIM_HOST=${DB_SWIM_HOST}
      - DB_SWIM_USER=${DB_SWIM_USER}
      - DB_SWIM_PASSWORD=${DB_SWIM_PASSWORD}
      - DB_SWIM_NAME=${DB_SWIM_NAME}
      - DB_SWIM_PORT=${DB_SWIM_PORT:-3306}
      - DB_RPI_HOST=${DB_RPI_HOST}
      - DB_RPI_USER=${DB_RPI_USER}
      - DB_RPI_PASSWORD=${DB_RPI_PASSWORD}
      - DB_RPI_NAME=${DB_RPI_NAME}
      - DB_RPI_PORT=${DB_RPI_PORT:-3306}
      - DB_HALLOWEEN_HOST=${DB_HALLOWEEN_HOST}
      - DB_HALLOWEEN_USER=${DB_HALLOWEEN_USER}
      - DB_HALLOWEEN_PASSWORD=${DB_HALLOWEEN_PASSWORD}
      - DB_HALLOWEEN_NAME=${DB_HALLOWEEN_NAME}
      - DB_HALLOWEEN_PORT=${DB_HALLOWEEN_PORT:-3306}
      - ENABLE_MORTGAGE_DASHBOARD=${ENABLE_MORTGAGE_DASHBOARD:-true}
      - ENABLE_SWIM_DASHBOARD=${ENABLE_SWIM_DASHBOARD:-true}
      - ENABLE_RPI_DASHBOARD=${ENABLE_RPI_DASHBOARD:-true}
      - ENABLE_HALLOWEEN_DASHBOARD=${ENABLE_HALLOWEEN_DASHBOARD:-true}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    networks:
      - ai-analytics

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - ai-analytics

networks:
  ai-analytics:
    driver: bridge
